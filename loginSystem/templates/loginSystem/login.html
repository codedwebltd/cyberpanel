{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1">
<title>Login — Codedhost</title>
<meta name="description" content="Codedhost — Hosting Control Panel">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script type="text/javascript" src="{% static 'baseTemplate/assets/js-core/jquery-core.min.js' %}"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif; }
body {
  background:
    radial-gradient(circle at 20% 0%, rgba(56, 189, 248, 0.16) 0%, transparent 55%),
    radial-gradient(circle at 80% 100%, rgba(37, 99, 235, 0.12) 0%, transparent 55%),
    #f7f5ef;
  color: #0a1a2f;
  overflow: hidden;
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
  position: relative;
}
.orb { position: fixed; border-radius: 50%; filter: blur(90px); opacity: 0.6; pointer-events: none; z-index: 0; }
.orb-1 { width: 460px; height: 460px; background: radial-gradient(circle, rgba(56,189,248,.5) 0%, transparent 70%); top: -180px; left: -120px; animation: float1 14s ease-in-out infinite; }
.orb-2 { width: 380px; height: 380px; background: radial-gradient(circle, rgba(37,99,235,.42) 0%, transparent 70%); bottom: -140px; right: -90px; animation: float2 18s ease-in-out infinite; }
.orb-3 { width: 280px; height: 280px; background: radial-gradient(circle, rgba(56,189,248,.35) 0%, transparent 70%); top: 40%; left: 60%; animation: float1 16s ease-in-out infinite reverse; }
@keyframes float1 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(30px, -40px); } }
@keyframes float2 { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-25px, 30px); } }

.login-wrap { position: relative; z-index: 2; width: 100%; max-width: 440px; }

.brand { text-align: center; margin-bottom: 36px; }
.brand-logo {
  font-family: 'Cormorant Garamond', serif;
  font-weight: 600;
  font-size: 64px;
  letter-spacing: -2px;
  background: linear-gradient(135deg, #0a2540 0%, #0e3a66 55%, #2563eb 100%);
  -webkit-background-clip: text;
  background-clip: text;
  -webkit-text-fill-color: transparent;
  filter: drop-shadow(0 4px 28px rgba(37, 99, 235, 0.18));
  line-height: 1;
  font-style: italic;
}
.brand-tagline {
  margin-top: 10px;
  font-size: 11px;
  letter-spacing: 5px;
  text-transform: uppercase;
  color: rgba(10, 26, 47, 0.5);
  font-weight: 500;
}

.card {
  background: #ffffff;
  border: 1px solid rgba(10, 26, 47, 0.1);
  border-radius: 22px;
  padding: 38px 34px;
  box-shadow: 0 40px 90px -50px rgba(10, 26, 47, 0.45);
}

.input-row { margin-bottom: 16px; position: relative; }
.input-row input, .input-row select {
  width: 100%;
  height: 50px;
  background: #f7f5ef;
  border: 1px solid rgba(10, 26, 47, 0.12);
  border-radius: 11px;
  padding: 0 18px;
  color: #0a1a2f;
  font-size: 14px;
  font-family: 'Inter', sans-serif;
  font-weight: 400;
  transition: all 0.25s ease;
  outline: none;
}
.input-row input::placeholder { color: rgba(10, 26, 47, 0.38); font-weight: 400; }
.input-row input:focus, .input-row select:focus {
  border-color: #2563eb;
  background: #ffffff;
  box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.14);
}
.input-row select {
  appearance: none;
  -webkit-appearance: none;
  background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg width='12' height='8' viewBox='0 0 12 8' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M1 1L6 6L11 1' stroke='%232563eb' stroke-width='1.5' stroke-linecap='round'/%3E%3C/svg%3E");
  background-repeat: no-repeat;
  background-position: right 18px center;
  padding-right: 42px;
  cursor: pointer;
}
.input-row select option { background: #ffffff; color: #0a1a2f; }

.btn-login {
  width: 100%;
  height: 52px;
  margin-top: 6px;
  background: linear-gradient(135deg, #2563eb 0%, #0e3a66 100%);
  border: 1px solid rgba(37, 99, 235, 0.3);
  border-radius: 11px;
  color: #fff;
  font-family: 'Inter', sans-serif;
  font-size: 13px;
  font-weight: 700;
  letter-spacing: 2.5px;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.35s ease;
  box-shadow: 0 12px 30px -10px rgba(37, 99, 235, 0.55);
  position: relative;
  overflow: hidden;
}
.btn-login:hover {
  transform: translateY(-2px);
  box-shadow: 0 18px 40px -10px rgba(37, 99, 235, 0.7);
}
.btn-login:active { transform: translateY(0); }

.error-box {
  display: none;
  margin-top: 16px;
  padding: 13px 18px;
  background: rgba(220, 38, 38, 0.08);
  border: 1px solid rgba(220, 38, 38, 0.28);
  border-radius: 11px;
  color: #b91c1c;
  font-size: 13px;
  text-align: center;
}
#loginFailed.alert { display: block; }

#verifyingLogin { display: none; margin: 8px auto 0; height: 16px; }

.footer {
  text-align: center;
  margin-top: 26px;
  font-size: 11px;
  color: rgba(10, 26, 47, 0.42);
  letter-spacing: 1px;
  font-weight: 400;
}
.footer a { color: #2563eb; text-decoration: none; font-weight: 600; transition: color 0.2s; }
.footer a:hover { color: #0e3a66; }

#loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: #f7f5ef; z-index: 9999; display: flex; align-items: center; justify-content: center; }
#loading .spinner { display: flex; gap: 8px; }
#loading .spinner > div { width: 14px; height: 14px; background: #2563eb; border-radius: 50%; animation: bouncedelay 1.4s infinite ease-in-out both; }
#loading .spinner .bounce1 { animation-delay: -0.32s; }
#loading .spinner .bounce2 { animation-delay: -0.16s; }
@keyframes bouncedelay { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }

@media (max-width: 480px) {
  .brand-logo { font-size: 52px; }
  .card { padding: 30px 24px; }
}

{{ cosmetic.MainDashboardCSS | safe }}
</style>
</head>
<body>
<div id="loading"><div class="spinner"><div class="bounce1"></div><div class="bounce2"></div><div class="bounce3"></div></div></div>
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div ng-app="loginSystem" ng-controller="loginSystem" ng-init="verifyCode=true" class="login-wrap">
  <div class="brand">
    <div class="brand-logo">codedhost</div>
    <div class="brand-tagline">Secure Hosting · Premium Solutions</div>
  </div>

  <form id="loginForm" action="/" class="card">
    <div class="input-row">
      <input ng-model="username" type="text" name="username" placeholder="Username" required autocomplete="username">
    </div>
    <div class="input-row">
      <input ng-keypress="initiateLogin($event)" ng-model="password" type="password" id="password" name="password" placeholder="Password" required autocomplete="current-password">
    </div>
    <div ng-hide="verifyCode" class="input-row">
      <input ng-model="twofa" type="text" name="twofa" placeholder="Enter 2FA code">
    </div>
    <div class="input-row">
      <select ng-model="languageSelection" ng-init="languageSelection='english'">
        <option value="english">English</option>
        <option>Bangla</option>
        <option>Bosnian</option>
        <option>Bulgarian</option>
        <option>Chinese</option>
        <option>French</option>
        <option>German</option>
        <option>Greek</option>
        <option>Italian</option>
        <option>Indonesian</option>
        <option>Japanese</option>
        <option>Polish</option>
        <option>Portuguese</option>
        <option>Russian</option>
        <option>Spanish</option>
        <option>Turkish</option>
        <option>Vietnamese</option>
      </select>
    </div>
    <button type="button" ng-click="verifyLoginCredentials()" class="btn-login">Sign In</button>
    <img id="verifyingLogin" src="{% static 'baseTemplate/images/loading.gif' %}">
  </form>

  <div id="loginFailed" class="error-box alert alert-danger">
    <p>Could not log in: <span ng-bind="errorMessage"></span></p>
  </div>

  <div class="footer">
    Powered by <a href="https://codedhost.vip" target="_blank">codedhost</a> · OpenLiteSpeed
  </div>
</div>

<script>
$(window).on('load', function () {
  setTimeout(function () { $('#loading').fadeOut(400, "linear"); }, 300);
});
</script>
<script src="https://code.angularjs.org/1.6.5/angular.min.js"></script>
<script src="https://code.angularjs.org/1.6.5/angular-route.min.js"></script>
<script src="{% static 'loginSystem/login-system.js' %}"></script>
</body>
</html>
